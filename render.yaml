services:
  - type: web
    name: fantastic-cup
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false
      - key: ADMIN_PASSWORD
        value: commander42
    healthCheckPath: /
    autoDeploy: false
