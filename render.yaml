services:
  - type: web
    name: fantastic-cup
    env: node
    buildCommand: npm install && cd client && npm install && npx vite build
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false
    healthCheckPath: /api/event-bridge/state
    autoDeploy: true
