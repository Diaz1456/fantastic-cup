<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Stock Market Ticker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #12121e;
    background-image:
      linear-gradient(90deg, rgba(212,160,23,0.04) 1px, transparent 1px),
      linear-gradient(rgba(212,160,23,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    color: #e8e0d4;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }

  .container { max-width: 960px; width: 100%; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 24px;
  }

  .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: 1px;
    color: #d4a017;
    text-shadow: 0 0 24px rgba(212,160,23,0.2);
  }

  .status-badge {
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 11px;
    letter-spacing: 1.2px;
    font-weight: 700;
    border: 1px solid rgba(212,160,23,0.2);
    background: #1e1e32;
    color: #b8a88a;
    transition: all 0.3s ease;
    text-align: center;
    font-family: 'Inter', sans-serif;
  }

  .status-badge.glow-green {
    background: rgba(27,122,61,0.15);
    border-color: #1b7a3d;
    color: #1b7a3d;
    box-shadow: 0 0 20px rgba(27,122,61,0.15);
    animation: pulseGreen 1s ease-in-out 3;
  }

  .status-badge.glow-red {
    background: rgba(192,57,43,0.15);
    border-color: #c0392b;
    color: #c0392b;
    box-shadow: 0 0 20px rgba(192,57,43,0.15);
    animation: pulseRed 1s ease-in-out 3;
  }

  @keyframes pulseGreen {
    0%, 100% { box-shadow: 0 0 20px rgba(27,122,61,0.15); }
    50% { box-shadow: 0 0 36px rgba(27,122,61,0.35); }
  }

  @keyframes pulseRed {
    0%, 100% { box-shadow: 0 0 20px rgba(192,57,43,0.15); }
    50% { box-shadow: 0 0 36px rgba(192,57,43,0.35); }
  }

  .connection-status {
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 6px 12px;
    border-radius: 4px;
    text-transform: uppercase;
    background: #1e1e32;
    border: 1px solid rgba(212,160,23,0.15);
  }

  .connection-status.online { color: #1b7a3d; border-color: rgba(27,122,61,0.3); }
  .connection-status.offline { color: #c0392b; border-color: rgba(192,57,43,0.3); }

  /* ─── CARD + TABLE LAYOUT ─── */
  .table-wrapper {
    overflow: visible;
    border: none;
    background: transparent;
    box-shadow: none;
    border-radius: 0;
  }

  table {
    display: block;
    width: 100%;
    min-width: auto;
    border-collapse: collapse;
  }

  thead { display: block; }
  thead tr { display: none; }

  tbody {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    gap: 0;
  }

  tbody tr {
    display: flex;
    flex-direction: column;
    position: relative;
    transition: all 0.3s ease;
  }

  /* ─── TOP 3 PROPERTY DEED CARDS ─── */
  tbody tr:nth-child(-n+3) {
    width: calc(33.33% - 20px);
    margin: 10px;
    background: #1e1e32;
    border: 1px solid rgba(212,160,23,0.3);
    border-radius: 12px;
    padding: 0;
    overflow: visible;
    align-self: flex-start;
  }

  tbody tr:nth-child(1) { order: 2; }
  tbody tr:nth-child(2) { order: 1; }
  tbody tr:nth-child(3) { order: 3; }

  /* Gold - #1 center, tallest with glow */
  tbody tr:nth-child(1) {
    border-color: rgba(212,160,23,0.6);
    box-shadow: 0 0 40px rgba(212,160,23,0.25), 0 8px 32px rgba(0,0,0,0.4);
    transform: scale(1.06);
    z-index: 3;
    margin-top: 0;
    margin-bottom: 0;
  }

  /* Silver - #2 left, slightly shorter */
  tbody tr:nth-child(2) {
    border-color: rgba(192,192,192,0.3);
    box-shadow: 0 0 20px rgba(192,192,192,0.08), 0 4px 20px rgba(0,0,0,0.3);
    margin-top: 20px;
  }

  /* Bronze - #3 right, slightly shorter */
  tbody tr:nth-child(3) {
    border-color: rgba(205,127,50,0.3);
    box-shadow: 0 0 20px rgba(205,127,50,0.08), 0 4px 20px rgba(0,0,0,0.3);
    margin-top: 20px;
  }

  /* Fresh update glow on cards */
  tbody tr:nth-child(-n+3).row-green {
    border-color: #1b7a3d !important;
    box-shadow: 0 0 40px rgba(27,122,61,0.25), 0 0 30px rgba(212,160,23,0.1);
  }

  tbody tr:nth-child(-n+3).row-red {
    border-color: #c0392b !important;
    box-shadow: 0 0 40px rgba(192,57,43,0.25), 0 0 30px rgba(212,160,23,0.1);
  }

  /* Bottom accent bar on cards */
  tbody tr:nth-child(-n+3)::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: -1px;
    right: -1px;
    height: 5px;
    border-radius: 0 0 12px 12px;
  }

  tbody tr:nth-child(1)::after { background: linear-gradient(90deg, #d4a017, #f0d060, #d4a017); }
  tbody tr:nth-child(2)::after { background: linear-gradient(90deg, #c0c0c0, #e0e0e0, #c0c0c0); }
  tbody tr:nth-child(3)::after { background: linear-gradient(90deg, #cd7f32, #e8a050, #cd7f32); }

  /* Card cells - restructure */
  tbody tr:nth-child(-n+3) td {
    display: block;
    border: none;
    text-align: center;
    padding: 6px 16px;
    background: transparent;
    color: #e8e0d4;
  }

  /* Hide rank, members, volume, last-event on cards */
  tbody tr:nth-child(-n+3) td:nth-child(1) { display: none; }
  tbody tr:nth-child(-n+3) td:nth-child(3) { display: none; }
  tbody tr:nth-child(-n+3) td:nth-child(6) { display: none; }
  tbody tr:nth-child(-n+3) td:nth-child(7) { display: none; }

  /* Logo + Team name */
  tbody tr:nth-child(-n+3) td:nth-child(2) {
    padding: 20px 16px 6px;
  }

  tbody tr:nth-child(-n+3) .team-cell {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.05rem;
    font-weight: 800;
    color: #e8e0d4;
    letter-spacing: 1px;
    line-height: 1.4;
  }

  tbody tr:nth-child(-n+3) .team-dot {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    display: block;
    margin: 0 auto 12px;
    border: 2px solid #d4a017;
    box-shadow: 0 0 16px rgba(212,160,23,0.25);
  }

  /* Price - huge monospace */
  tbody tr:nth-child(-n+3) td:nth-child(4) {
    padding: 4px 16px 2px;
  }

  tbody tr:nth-child(-n+3) .price {
    font-family: 'Courier New', monospace;
    font-size: 2rem;
    font-weight: 900;
    color: #1b7a3d;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(27,122,61,0.25);
  }

  tbody tr:nth-child(-n+3) .price::before {
    content: '$';
    color: #1b7a3d;
  }

  /* Change */
  tbody tr:nth-child(-n+3) td:nth-child(5) {
    padding: 2px 16px 4px;
  }

  tbody tr:nth-child(-n+3) .change {
    font-size: 1.1rem;
    padding-bottom: 2px;
  }

  tbody tr:nth-child(-n+3) .change .up {
    color: #1b7a3d;
    font-weight: 700;
  }

  tbody tr:nth-child(-n+3) .change .down {
    color: #c0392b;
    font-weight: 700;
  }

  tbody tr:nth-child(-n+3) .change .neutral {
    color: #7a6a5a;
  }

  /* Sparkline bar chart */
  tbody tr:nth-child(-n+3) td:nth-child(5)::after {
    content: '';
    display: block;
    height: 22px;
    width: 50px;
    margin: 10px auto 4px;
    border-radius: 2px;
    opacity: 0.85;
  }

  tbody tr:nth-child(-n+3):not(.row-red) td:nth-child(5)::after {
    background:
      linear-gradient(to top, #1b7a3d 38%, transparent 38%) 0 0/7px 100% no-repeat,
      linear-gradient(to top, #1b7a3d 62%, transparent 62%) 9px 0/7px 100% no-repeat,
      linear-gradient(to top, #1b7a3d 28%, transparent 28%) 18px 0/7px 100% no-repeat,
      linear-gradient(to top, #1b7a3d 75%, transparent 75%) 27px 0/7px 100% no-repeat,
      linear-gradient(to top, #1b7a3d 48%, transparent 48%) 36px 0/7px 100% no-repeat;
  }

  tbody tr:nth-child(-n+3).row-red td:nth-child(5)::after {
    background:
      linear-gradient(to top, #c0392b 38%, transparent 38%) 0 0/7px 100% no-repeat,
      linear-gradient(to top, #c0392b 62%, transparent 62%) 9px 0/7px 100% no-repeat,
      linear-gradient(to top, #c0392b 28%, transparent 28%) 18px 0/7px 100% no-repeat,
      linear-gradient(to top, #c0392b 75%, transparent 75%) 27px 0/7px 100% no-repeat,
      linear-gradient(to top, #c0392b 48%, transparent 48%) 36px 0/7px 100% no-repeat;
  }

  /* ─── TABLE ROWS (teams 4+) ─── */
  tbody tr:nth-child(n+4) {
    width: 100%;
    flex-direction: row;
    flex-wrap: nowrap;
    align-items: center;
    background: rgba(30,30,50,0.35);
    border-bottom: 1px solid rgba(212,160,23,0.08);
    padding: 0;
    backdrop-filter: blur(2px);
  }

  tbody tr:nth-child(n+4):hover {
    background: rgba(30,30,50,0.7);
  }

  tbody tr:nth-child(n+4) td {
    display: block;
    flex: 1;
    padding: 12px 14px;
    border: none;
    color: #b8a88a;
    vertical-align: middle;
    font-size: 0.85rem;
    background: transparent;
  }

  tbody tr:nth-child(n+4) td:nth-child(1) { flex: 0 0 40px; text-align: center; }
  tbody tr:nth-child(n+4) td:nth-child(2) { flex: 2; }
  tbody tr:nth-child(n+4) td:nth-child(3) { flex: 1.8; }
  tbody tr:nth-child(n+4) td:nth-child(4) { flex: 0 0 90px; }
  tbody tr:nth-child(n+4) td:nth-child(5) { flex: 0 0 85px; }
  tbody tr:nth-child(n+4) td:nth-child(6) { flex: 0 0 75px; text-align: right; }
  tbody tr:nth-child(n+4) td:nth-child(7) { flex: 2; }

  tbody tr:nth-child(n+4).row-green {
    background: rgba(27,122,61,0.08) !important;
    border-left: 3px solid #1b7a3d;
  }

  tbody tr:nth-child(n+4).row-red {
    background: rgba(192,57,43,0.08) !important;
    border-left: 3px solid #c0392b;
  }

  /* ─── COMMON TABLE CLASSES ─── */
  .rank { font-weight: 700; color: #7a6a5a; }
  .rank-1 { color: #d4a017 !important; text-shadow: 0 0 10px rgba(212,160,23,0.4); }

  .team-cell { font-weight: 700; letter-spacing: 1px; }
  .team-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 7px; vertical-align: middle; }

  .members-pill { font-size: 10px; color: #6a5a4a; letter-spacing: 0.5px; }

  .price {
    font-family: 'Courier New', monospace;
    font-weight: 900;
    font-size: 1.15rem;
    letter-spacing: 1px;
    color: #1b7a3d;
  }

  .price.pop { animation: priceBounce 0.3s ease; }
  @keyframes priceBounce {
    0% { transform: scale(1); }
    40% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  .change { font-size: 0.9rem; }
  .change .up { color: #1b7a3d; font-weight: 700; animation: fadeUp 0.4s ease-out; }
  .change .down { color: #c0392b; font-weight: 700; animation: fadeDown 0.4s ease-out; }
  .change .neutral { color: #6a5a4a; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  .volume { color: #7a6a5a; font-size: 0.85rem; }

  .last-event {
    font-size: 0.78rem;
    color: #7a6a5a;
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .last-event.fresh { color: #e8e0d4; font-weight: 700; }

  /* ─── LOG AREA ─── */
  .log-area {
    margin-top: 16px;
    background: rgba(30,30,50,0.5);
    border: 1px solid rgba(212,160,23,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    max-height: 130px;
    overflow-y: auto;
    font-size: 11px;
    color: #b8a88a;
    letter-spacing: 0.5px;
    font-family: 'Inter', sans-serif;
    backdrop-filter: blur(4px);
  }

  .log-area::-webkit-scrollbar { width: 4px; }
  .log-area::-webkit-scrollbar-track { background: transparent; }
  .log-area::-webkit-scrollbar-thumb { background: rgba(212,160,23,0.15); border-radius: 3px; }

  .log-entry { margin-bottom: 2px; }
  .log-entry .pos { color: #1b7a3d; }
  .log-entry .neg { color: #c0392b; }

  /* ─── BOTTOM BAR ─── */
  .bottom-bar {
    margin-top: 18px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .bottom-bar a {
    background: #1e1e32;
    border: 1px solid rgba(212,160,23,0.25);
    color: #d4a017;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 10px 22px;
    border-radius: 8px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    text-decoration: none;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .bottom-bar a:hover {
    border-color: rgba(212,160,23,0.5);
    background: #2a2a45;
    box-shadow: 0 0 24px rgba(212,160,23,0.08), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  /* ─── DONATION ALERT ─── */
  .donation-alert-container {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
  }

  .donation-alert {
    background: #1e1e32;
    border: 2px solid rgba(212,160,23,0.35);
    border-radius: 12px;
    padding: 0.8rem 1.5rem;
    box-shadow: 0 8px 36px rgba(0,0,0,0.5), 0 0 40px rgba(212,160,23,0.06);
    animation: donationSlideIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    max-width: 420px;
    width: 90%;
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .donation-alert.exit {
    animation: donationFadeOut 0.4s ease forwards;
  }

  .donation-alert-icon { font-size: 2rem; flex-shrink: 0; }
  .donation-alert-body { flex: 1; min-width: 0; }

  .donation-alert-team {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 800;
    font-size: 1rem;
    color: #e8e0d4;
  }

  .donation-alert-amount {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 900;
    font-size: 1.3rem;
    margin-top: 2px;
  }

  .donation-alert-amount.up { color: #1b7a3d; }
  .donation-alert-amount.down { color: #c0392b; }

  .donation-alert-arrow { font-size: 1rem; margin-right: 4px; }

  .donation-alert-player {
    font-size: 0.75rem;
    color: #7a6a5a;
    margin-top: 2px;
  }

  @keyframes donationSlideIn {
    0% { opacity: 0; transform: translateY(-40px) scale(0.8); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes donationFadeOut {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-30px) scale(0.9); }
  }

  /* ─── CENTER STOCK NOTIFICATION ─── */
  .stock-notification-overlay {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    animation: overlayFadeIn 0.3s ease;
  }

  .stock-notification-overlay.hide {
    animation: overlayFadeOut 0.3s ease forwards;
  }

  .stock-notification-modal {
    background: #1e1e32;
    border: 2px solid rgba(212,160,23,0.35);
    border-radius: 16px;
    padding: 2rem 2.5rem;
    max-width: 480px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 80px rgba(212,160,23,0.06);
    animation: modalPopIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    position: relative;
  }

  .stock-notification-modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, #d4a017, #1b7a3d, #d4a017);
    border-radius: 14px 14px 0 0;
  }

  .stock-notification-modal.exit {
    animation: modalPopOut 0.3s ease forwards;
  }

  .stock-notif-icon { font-size: 3rem; margin-bottom: 0.5rem; }
  .stock-notif-team {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.6rem;
    font-weight: 900;
    color: #e8e0d4;
    margin-bottom: 0.3rem;
  }
  .stock-notif-change {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2.2rem;
    font-weight: 900;
    margin-bottom: 0.3rem;
  }
  .stock-notif-change.up { color: #1b7a3d; }
  .stock-notif-change.down { color: #c0392b; }
  .stock-notif-price {
    font-size: 1rem;
    color: #b8a88a;
    margin-bottom: 0.5rem;
  }
  .stock-notif-price strong { color: #e8e0d4; }
  .stock-notif-player {
    font-size: 0.85rem;
    color: #7a6a5a;
    margin-bottom: 1rem;
    font-weight: 600;
  }
  .stock-notif-dismiss {
    background: #12121e;
    border: 1px solid rgba(212,160,23,0.25);
    color: #d4a017;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 1.5px;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    text-transform: uppercase;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    transition: all 0.2s;
  }
  .stock-notif-dismiss:hover {
    border-color: rgba(212,160,23,0.5);
    background: #2a2a45;
    box-shadow: 0 0 24px rgba(212,160,23,0.08);
  }

  @keyframes overlayFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes overlayFadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  @keyframes modalPopIn {
    0% { opacity: 0; transform: scale(0.7) translateY(30px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes modalPopOut {
    0% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.8) translateY(20px); }
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 800px) {
    body { padding: 16px 10px; }
    .title { font-size: 1.2rem; }

    tbody tr:nth-child(-n+3) {
      width: calc(50% - 20px);
    }

    tbody tr:nth-child(1) {
      width: calc(100% - 20px);
      transform: none;
      order: 0;
    }

    tbody tr:nth-child(2) { order: 1; margin-top: 10px; }
    tbody tr:nth-child(3) { order: 2; margin-top: 10px; }
  }

  @media (max-width: 500px) {
    body { padding: 12px 6px; }
    .title { font-size: 1rem; }

    tbody tr:nth-child(-n+3) {
      width: calc(100% - 12px);
      margin: 6px;
      transform: none;
    }

    tbody tr:nth-child(-n+3) .price {
      font-size: 1.5rem;
    }

    tbody tr:nth-child(1) {
      margin-top: 6px;
    }

    tbody tr:nth-child(2),
    tbody tr:nth-child(3) {
      margin-top: 6px;
    }

    tbody tr:nth-child(1)::after,
    tbody tr:nth-child(2)::after,
    tbody tr:nth-child(3)::after {
      display: none;
    }

    tbody tr:nth-child(n+4) td {
      padding: 8px 6px;
      font-size: 0.7rem;
    }

    tbody tr:nth-child(n+4) td:nth-child(3) { display: none; }
    tbody tr:nth-child(n+4) td:nth-child(7) { display: none; }

    .price { font-size: 0.95rem; }
    .status-badge { font-size: 10px; padding: 4px 10px; }
    .last-event { max-width: 80px; }
  }
</style>
</head>
<body>
<div id="donation-alert-container"></div>
<div id="stock-notification-overlay" class="stock-notification-overlay" style="display:none">
  <div class="stock-notification-modal" id="stock-notification-modal"></div>
</div>
<div class="container">

  <div class="header">
    <h1 class="title">Team Stock Market Ticker</h1>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <span id="statusBadge" class="status-badge">WAITING...</span>
      <span id="connStatus" class="connection-status offline">OFFLINE</span>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Team</th>
          <th>Players</th>
          <th>Price</th>
          <th>Change</th>
          <th>Vol</th>
          <th>Last Event</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7" style="text-align:center;color:#4a6a90;padding:40px;">Connecting to server...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="log-area" id="logArea"></div>

  <div class="bottom-bar">
    <a href="/">MAIN MENU</a>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io({ transports: ['websocket', 'polling'] });
const tbody = document.getElementById('tbody');
const statusBadge = document.getElementById('statusBadge');
const logArea = document.getElementById('logArea');
const connStatus = document.getElementById('connStatus');
let teamsCache = [];  // { id, name, color, logo, members, stock }
let logEntries = [];
const MAX_LOG = 40;
let freshTeamId = null;
let freshAction = null;
let rankVersion = 0;

// ─── CONNECTION ─────────────────────────────────────────────────────────────
socket.on('connect', () => {
  connStatus.textContent = '● ONLINE';
  connStatus.className = 'connection-status online';
  socket.emit('teamstock:join');
});

socket.on('disconnect', () => {
  connStatus.textContent = 'OFFLINE';
  connStatus.className = 'connection-status offline';
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#4a6a90;padding:40px;">Disconnected from server.</td></tr>';
});

// ─── RENDER ─────────────────────────────────────────────────────────────────
function render() {
  const sorted = [...teamsCache].sort((a, b) => (b.stock?.price || 0) - (a.stock?.price || 0) || a.name.localeCompare(b.name));

  let html = '';
  sorted.forEach((team, i) => {
    const rank = i + 1;
    const st = team.stock || { price: 0, volume: 0, lastDelta: 0, lastAction: null, lastEvent: null, lastPlayer: null };

    const rankClass = rank === 1 ? 'rank rank-1' : 'rank';
    const rankDisp = rank;

    let changeHtml = '';
    if (st.lastAction === 'pos') changeHtml = `<span class="up">▲ +${st.lastDelta}</span>`;
    else if (st.lastAction === 'neg') changeHtml = `<span class="down">▼ ${st.lastDelta}</span>`;
    else changeHtml = `<span class="neutral">--</span>`;

    const isFresh = freshTeamId === team.id;
    const rowClass = isFresh ? (freshAction === 'pos' ? 'row-green' : (freshAction === 'neg' ? 'row-red' : '')) : '';
    const lastText = st.lastPlayer
      ? `${st.lastPlayer}: ${st.lastEvent} (${st.lastDelta > 0 ? '+' : ''}${st.lastDelta})`
      : '—';

    const memberList = (team.members || []).join(', ');

    html += `<tr class="${rowClass}">
      <td class="${rankClass}">${rankDisp}</td>
      <td class="team-cell"><span class="team-dot" style="background:${team.color}"></span>${team.name}</td>
      <td class="members-pill">${memberList}</td>
      <td class="price ${isFresh ? 'pop' : ''}">${st.price}</td>
      <td class="change">${changeHtml}</td>
      <td class="volume">${(st.volume || 0).toLocaleString()}</td>
      <td class="last-event ${isFresh ? 'fresh' : ''}">${lastText}</td>
    </tr>`;
  });

  tbody.innerHTML = html;

  // Clear freshness after 2s
  if (freshTeamId) {
    setTimeout(() => {
      freshTeamId = null;
      freshAction = null;
      renderPlain();
    }, 2200);
  }
}

function renderPlain() {
  const sorted = [...teamsCache].sort((a, b) => (b.stock?.price || 0) - (a.stock?.price || 0) || a.name.localeCompare(b.name));
  let html = '';
  sorted.forEach((team, i) => {
    const rank = i + 1;
    const st = team.stock || { price: 0, volume: 0, lastDelta: 0, lastAction: null, lastEvent: null, lastPlayer: null };
    const rankClass = rank === 1 ? 'rank rank-1' : 'rank';
    const rankDisp = rank;
    let ch = '';
    if (st.lastAction === 'pos') ch = `<span class="up">▲ +${st.lastDelta}</span>`;
    else if (st.lastAction === 'neg') ch = `<span class="down">▼ ${st.lastDelta}</span>`;
    else ch = `<span class="neutral">--</span>`;
    const lt = st.lastPlayer ? `${st.lastPlayer}: ${st.lastEvent} (${st.lastDelta > 0 ? '+' : ''}${st.lastDelta})` : '—';
    html += `<tr>
      <td class="${rankClass}">${rankDisp}</td>
      <td class="team-cell"><span class="team-dot" style="background:${team.color}"></span>${team.name}</td>
      <td class="members-pill">${(team.members || []).join(', ')}</td>
      <td class="price">${st.price}</td>
      <td class="change">${ch}</td>
      <td class="volume">${(st.volume || 0).toLocaleString()}</td>
      <td class="last-event">${lt}</td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

// ─── STATUS BADGE ───────────────────────────────────────────────────────────
function updateBadge(teamName, delta, player, cat) {
  if (!teamName) {
    statusBadge.className = 'status-badge';
    statusBadge.textContent = 'Waiting for events...';
    return;
  }
  const label = cat || 'achievement';
  if (delta >= 0) {
    statusBadge.className = 'status-badge glow-green';
    statusBadge.textContent = `${teamName} boosted — ${player}: ${label} (+${delta})`;
  } else {
    statusBadge.className = 'status-badge glow-red';
    statusBadge.textContent = `${teamName} dips — ${player}: ${label} (${delta})`;
  }
}

// ─── LOG ────────────────────────────────────────────────────────────────────
function addLog(teamName, player, cat, delta) {
  const sign = delta >= 0 ? '+' : '';
  const cls = delta >= 0 ? 'pos' : 'neg';
  const ts = new Date().toLocaleTimeString();
  logEntries.unshift(`<div class="log-entry">[${ts}] <strong>${teamName}</strong> — ${player}: ${cat} <span class="${cls}">(${sign}${delta})</span></div>`);
  if (logEntries.length > MAX_LOG) logEntries.length = MAX_LOG;
  logArea.innerHTML = logEntries.join('');
}

// ─── DONATION ALERT ──────────────────────────────────────────────────────────
function showDonationAlert(teamName, teamColor, delta, player, cat, newPrice) {
  const container = document.getElementById('donation-alert-container');
  if (!container) return;
  const div = document.createElement('div');
  div.className = 'donation-alert';
  const isUp = delta > 0;
  const arrow = isUp ? '▲' : '▼';
  const cls = isUp ? 'up' : 'down';
  const icon = isUp ? 'UP' : 'DOWN';
  const label = cat || 'achievement';
  div.innerHTML = `
    <div class="donation-alert-icon" style="font-size:1rem;font-weight:700;">${icon}</div>
    <div class="donation-alert-body">
      <div class="donation-alert-team" style="color:${teamColor}">${teamName}</div>
      <div class="donation-alert-amount ${cls}"><span class="donation-alert-arrow">${arrow}</span>$${newPrice}</div>
      <div class="donation-alert-player">${player} — ${label}</div>
    </div>
  `;
  container.prepend(div);
  while (container.children.length > 3) container.lastChild.remove();
  setTimeout(() => {
    div.classList.add('exit');
    setTimeout(() => div.remove(), 400);
  }, 2500);
  // Cash register sound
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (AudioCtx) {
      const ctx = new AudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, ctx.currentTime);
      osc.frequency.setValueAtTime(1000, ctx.currentTime + 0.08);
      osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.16);
      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.3);
    }
  } catch(e) {}
}

// ─── CENTER NOTIFICATION ────────────────────────────────────────────────────
function showCenterNotification(teamName, teamColor, delta, player, cat, newPrice) {
  const overlay = document.getElementById('stock-notification-overlay');
  const modal = document.getElementById('stock-notification-modal');
  if (!overlay || !modal) return;
  const isUp = delta > 0;
  const icon = isUp ? 'UP' : 'DOWN';
  const sign = isUp ? '+' : '';
  const cls = isUp ? 'up' : 'down';
  const label = cat || 'achievement';
  modal.innerHTML = `
    <div class="stock-notif-icon" style="font-size:1.5rem;font-weight:700;">${icon}</div>
    <div class="stock-notif-team" style="color:${teamColor}">${teamName}</div>
    <div class="stock-notif-change ${cls}">${sign}${delta}</div>
    <div class="stock-notif-price">New price: <strong>$${newPrice}</strong></div>
    <div class="stock-notif-player">${player} — ${label}</div>
    <button class="stock-notif-dismiss" onclick="dismissCenterNotification()">Dismiss</button>
  `;
  overlay.style.display = 'flex';
  overlay.classList.remove('hide');
  modal.classList.remove('exit');
  if (window._centerNotifTimer) clearTimeout(window._centerNotifTimer);
  window._centerNotifTimer = setTimeout(dismissCenterNotification, 4000);
}

function dismissCenterNotification() {
  const overlay = document.getElementById('stock-notification-overlay');
  const modal = document.getElementById('stock-notification-modal');
  if (!overlay || !modal) return;
  modal.classList.add('exit');
  overlay.classList.add('hide');
  setTimeout(() => {
    overlay.style.display = 'none';
  }, 300);
}

// ─── SOCKET LISTENER: track fresh updates for glow ─────────────────────────
socket.on('teamstockUpdate', (data) => {
  if (!data || !data.teams) return;

  // Detect which team was just updated
  const prev = teamsCache;
  for (const t of data.teams) {
    const old = prev.find(p => p.id === t.id);
    if (old && old.stock && t.stock && old.stock.volume !== t.stock.volume) {
      freshTeamId = t.id;
      freshAction = t.stock.lastAction;
      updateBadge(t.name, t.stock.lastDelta, t.stock.lastPlayer, t.stock.lastEvent);
      addLog(t.name, t.stock.lastPlayer, t.stock.lastEvent, t.stock.lastDelta);
      showDonationAlert(t.name, t.color, t.stock.lastDelta, t.stock.lastPlayer, t.stock.lastEvent, t.stock.price);
      showCenterNotification(t.name, t.color, t.stock.lastDelta, t.stock.lastPlayer, t.stock.lastEvent, t.stock.price);
      break;
    }
  }

  teamsCache = data.teams;
  rankVersion++;
  render();
});

</script>
</body>
</html>
